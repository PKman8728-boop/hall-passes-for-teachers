<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teacher Pass</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 300px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Request Pass</h2>

  <input id="teacher" placeholder="Teacher Last Name">
  <input id="room" placeholder="Room Number">

  <select id="quantity">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>

  <button onclick="submit()">Submit</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  'https://gmgoxphohdxjfpttanpq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZ294cGhvaGR4amZwdHRhbnBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODg3NDYsImV4cCI6MjA5MTk2NDc0Nn0.w9MkUHwUCuyjetTHl7sJ2848PayiPwbaEebO4oO1mmA'
);

async function submit() {
  const teacher = document.getElementById('teacher').value;
  const room = document.getElementById('room').value;
  const quantity = document.getElementById('quantity').value;

  if (!teacher || !room) {
    alert("Fill everything");
    return;
  }

  const { error } = await supabase
    .from('requests')
    .insert([{ teacher, room, quantity }]);

  if (error) {
    alert(error.message);
    return;
  }

  alert("Submitted!");
}
</script>

</body>
</html>
