<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7ff;
      margin: 0;
      padding: 40px 20px;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      color: #666;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #4f46e5;
      color: white;
    }
    button {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .delete {
      background: #dc2626;
      color: white;
    }
    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .refresh {
      background: #4f46e5;
      color: white;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Admin - Requests</h1>
    <p>All teacher requests show here.</p>

    <div class="topbar">
      <button class="refresh" onclick="loadRequests()">Refresh</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Teacher</th>
          <th>Room</th>
          <th>Qty</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = window.supabase.createClient(
      'https://gmgoxphohdxjfpttanpq.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZ294cGhvaGR4amZwdHRhbnBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODg3NDYsImV4cCI6MjA5MTk2NDc0Nn0.w9MkUHwUCuyjetTHl7sJ2848PayiPwbaEebO4oO1mmA'
    );

    async function loadRequests() {
      const { data, error } = await supabase
        .from('requests')
        .select('*')
        .order('id', { ascending: false });

      const table = document.getElementById('table');
      table.innerHTML = '';

      if (error) {
        console.error(error);
        alert('Load failed: ' + error.message);
        return;
      }

      if (!data || !data.length) {
        table.innerHTML = '<tr><td colspan="4">No requests yet.</td></tr>';
        return;
      }

      data.forEach(r => {
        table.innerHTML += `
          <tr>
            <td>${escapeHtml(r.teacher)}</td>
            <td>${escapeHtml(r.room)}</td>
            <td>${escapeHtml(String(r.quantity || 1))}</td>
            <td><button class="delete" onclick="deleteRequest(${r.id})">X</button></td>
          </tr>
        `;
      });
    }

    async function deleteRequest(id) {
      const { error } = await supabase
        .from('requests')
        .delete()
        .eq('id', id);

      if (error) {
        console.error(error);
        alert('Delete failed: ' + error.message);
        return;
      }

      loadRequests();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadRequests();
  </script>
</body>
</html>
