async function addColor() {
  const name = document.getElementById('name').value;
  const hex = document.getElementById('hex').value;
  await supabase.from('colors').insert([{ name, hex }]);
  loadColors();
}


async function deleteColor(id) {
  await supabase.from('colors').delete().eq('id', id);
  loadColors();
}


async function loadColors() {
  const { data } = await supabase.from('colors').select('*');
  const div = document.getElementById('colors');
  div.innerHTML = '';
  data.forEach(c => {
    div.innerHTML += `${c.name} <button onclick="deleteColor(${c.id})">X</button><br>`;
  });
}


async function loadRequests() {
  const { data } = await supabase.from('requests').select('*');
  const div = document.getElementById('requests');
  div.innerHTML = '';
  data.forEach(r => {
    div.innerHTML += `${r.teacher} - ${r.room} - ${r.color}<br>`;
  });
}


loadColors();
loadRequests();
