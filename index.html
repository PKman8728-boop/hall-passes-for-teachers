<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Pass</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7ff;
      margin: 0;
      padding: 40px 20px;
    }
    .wrap {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      color: #666;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      background: #4f46e5;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Request a Pass</h1>
    <p>Enter the teacher last name, room number, and quantity.</p>

    <label for="teacher">Teacher Last Name</label>
    <input id="teacher" type="text" />

    <label for="room">Room Number</label>
    <input id="room" type="text" />

    <label for="quantity">Quantity</label>
    <select id="quantity">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>

    <button onclick="submitRequest()">Submit</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabase = window.supabase.createClient(
      'https://gmgoxphohdxjfpttanpq.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZ294cGhvaGR4amZwdHRhbnBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODg3NDYsImV4cCI6MjA5MTk2NDc0Nn0.w9MkUHwUCuyjetTHl7sJ2848PayiPwbaEebO4oO1mmA'
    );

    async function submitRequest() {
      const teacher = document.getElementById('teacher').value.trim();
      const room = document.getElementById('room').value.trim();
      const quantity = Number(document.getElementById('quantity').value);

      if (!teacher || !room) {
        alert('Please fill out teacher last name and room number.');
        return;
      }

      const { error } = await supabase
        .from('requests')
        .insert([{ teacher, room, quantity }]);

      if (error) {
        console.error(error);
        alert('Submit failed: ' + error.message);
        return;
      }

      alert('Submitted!');
      document.getElementById('teacher').value = '';
      document.getElementById('room').value = '';
      document.getElementById('quantity').value = '1';
    }
  </script>
</body>
</html>
