<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Pass</title>
</head>
<body>
<h2>Request a Pass</h2>

<input id="teacher" placeholder="Teacher Last Name"><br><br>
<input id="room" placeholder="Room Number"><br><br>

<select id="color"></select><br><br>

<button onclick="submit()">Submit</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  'https://gmgoxphohdxjfpttanpq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZ294cGhvaGR4amZwdHRhbnBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODg3NDYsImV4cCI6MjA5MTk2NDc0Nn0.w9MkUHwUCuyjetTHl7sJ2848PayiPwbaEebO4oO1mmA'
);

async function loadColors() {
  const { data } = await supabase.from('colors').select('*');
  const select = document.getElementById('color');
  select.innerHTML = '<option value="">Select Color</option>';
  data.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.name;
    opt.textContent = c.name;
    select.appendChild(opt);
  });
}

async function submit() {
  const teacher = document.getElementById('teacher').value;
  const room = document.getElementById('room').value;
  const color = document.getElementById('color').value;

  if (!teacher || !room || !color) {
    alert('Fill everything');
    return;
  }

  await supabase.from('requests').insert([{ teacher, room, color }]);
  alert('Submitted');
}

loadColors();
</script>
</body>
</html>
