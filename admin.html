<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7ff;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #4f46e5;
      color: white;
    }

    button {
      padding: 5px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete {
      background: red;
      color: white;
    }
  </style>
</head>
<body>

<h2>Admin - Requests</h2>

<table>
  <thead>
    <tr>
      <th>Teacher</th>
      <th>Room</th>
      <th>Qty</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  'https://gmgoxphohdxjfpttanpq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZ294cGhvaGR4amZwdHRhbnBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODg3NDYsImV4cCI6MjA5MTk2NDc0Nn0.w9MkUHwUCuyjetTHl7sJ2848PayiPwbaEebO4oO1mmA'
);

async function load() {
  const { data } = await supabase.from('requests').select('*');

  const table = document.getElementById('table');
  table.innerHTML = '';

  data.forEach(r => {
    table.innerHTML += `
      <tr>
        <td>${r.teacher}</td>
        <td>${r.room}</td>
        <td>${r.quantity}</td>
        <td><button class="delete" onclick="del(${r.id})">X</button></td>
      </tr>
    `;
  });
}

async function del(id) {
  await supabase.from('requests').delete().eq('id', id);
  load();
}

load();
</script>

</body>
</html>
